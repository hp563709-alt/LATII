<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Clone</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background: #00a884;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }
        .app {
            width: 100%;
            max-width: 400px;
            height: 700px;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
        }
        .screen {
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .logo {
            font-size: 60px;
            margin-bottom: 20px;
        }
        h1, h2 {
            color: #008069;
            margin-bottom: 30px;
        }
        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 20px;
            outline: none;
        }
        input:focus {
            border-color: #008069;
        }
        button {
            width: 100%;
            padding: 15px;
            background: #008069;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 10px;
        }
        .google-btn {
            background: #db4437;
        }
        .hidden {
            display: none !important;
        }
        #otpScreen, #chatScreen {
            display: none;
        }
        #chatScreen {
            justify-content: flex-start;
            padding: 0;
        }
        .chat-header {
            background: #008069;
            color: white;
            padding: 15px;
            width: 100%;
            display: flex;
            align-items: center;
        }
        .back-btn {
            font-size: 20px;
            margin-right: 10px;
            cursor: pointer;
        }
        .messages {
            flex: 1;
            width: 100%;
            overflow-y: auto;
            padding: 10px;
            background: #e5ded8;
        }
        .message {
            margin: 5px 0;
            padding: 10px;
            border-radius: 10px;
            max-width: 80%;
            word-wrap: break-word;
        }
        .message.sent {
            background: #dcf8c6;
            margin-left: auto;
        }
        .message.received {
            background: white;
            border: 1px solid #ddd;
        }
        .message small {
            display: block;
            font-size: 10px;
            color: #666;
            margin-top: 5px;
        }
        .chat-input-area {
            display: flex;
            padding: 10px;
            width: 100%;
            background: white;
        }
        .chat-input-area input {
            flex: 1;
            margin-right: 10px;
            margin-bottom: 0;
        }
        .chat-input-area button {
            width: auto;
            padding: 10px 20px;
        }
        .phone-display {
            margin-bottom: 10px;
            color: #666;
        }
        .otp-input {
            letter-spacing: 8px;
            font-size: 24px;
            text-align: center;
        }
        .or-divider {
            margin: 15px 0;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="app" id="app">
        <!-- Login Screen -->
        <div id="loginScreen" class="screen">
            <div class="logo">💬</div>
            <h1>WhatsApp Clone</h1>
            <input type="tel" id="phoneNumber" placeholder="+91 9876543210" value="+91">
            <button id="sendOtpBtn">Send OTP</button>
            <div class="or-divider">or</div>
            <button id="googleSignInBtn" class="google-btn">Sign in with Google</button>
            <p style="margin-top: 20px; color: #666;">By continuing, you agree to Terms</p>
        </div>

        <!-- OTP Screen -->
        <div id="otpScreen" class="screen">
            <h2>Verify Phone</h2>
            <p class="phone-display" id="displayPhone"></p>
            <input type="text" id="otpInput" class="otp-input" placeholder="______" maxlength="6">
            <button id="verifyBtn">Verify & Continue</button>
            <button id="resendBtn" style="background:#666;">Resend OTP</button>
        </div>

        <!-- Chat Screen -->
        <div id="chatScreen" class="screen">
            <div class="chat-header">
                <span class="back-btn" id="backBtn">←</span>
                <span><strong id="chatUser">User</strong></span>
            </div>
            <div id="messages" class="messages"></div>
            <div class="chat-input-area">
                <input type="text" id="messageInput" placeholder="Type a message">
                <button id="sendMsgBtn">Send</button>
            </div>
        </div>
    </div>

    <!-- Firebase Script (with all necessary imports) -->
    <script type="module">
        // Import Firebase SDKs
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
        import { getAuth, signInWithPhoneNumber, RecaptchaVerifier, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
        import { getDatabase, ref, push, onChildAdded, set, onDisconnect } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-analytics.js";

        // Your web app's Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAPItOvh6ESGg0itorDW0NuFx3zPFUD_oU",
            authDomain: "latii-f124d.firebaseapp.com",
            databaseURL: "https://latii-f124d-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "latii-f124d",
            storageBucket: "latii-f124d.firebasestorage.app",
            messagingSenderId: "585709718787",
            appId: "1:585709718787:web:7d89b825af2221c7bcad36",
            measurementId: "G-K4R1NLS0L8"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const database = getDatabase(app);
        const analytics = getAnalytics(app); // optional

        // DOM elements
        const loginScreen = document.getElementById('loginScreen');
        const otpScreen = document.getElementById('otpScreen');
        const chatScreen = document.getElementById('chatScreen');
        const phoneInput = document.getElementById('phoneNumber');
        const sendOtpBtn = document.getElementById('sendOtpBtn');
        const otpInput = document.getElementById('otpInput');
        const verifyBtn = document.getElementById('verifyBtn');
        const resendBtn = document.getElementById('resendBtn');
        const displayPhone = document.getElementById('displayPhone');
        const backBtn = document.getElementById('backBtn');
        const chatUser = document.getElementById('chatUser');
        const messageInput = document.getElementById('messageInput');
        const sendMsgBtn = document.getElementById('sendMsgBtn');
        const messagesDiv = document.getElementById('messages');
        const googleSignInBtn = document.getElementById('googleSignInBtn');

        let confirmationResult;
        let currentUser = null;

        // ---------- PHONE OTP LOGIN ----------
        sendOtpBtn.addEventListener('click', async () => {
            const phone = phoneInput.value.trim();
            if (!phone) return alert('Enter phone number');

            window.recaptchaVerifier = new RecaptchaVerifier(auth, 'sendOtpBtn', {
                size: 'invisible',
                callback: () => {}
            });

            try {
                confirmationResult = await signInWithPhoneNumber(auth, phone, window.recaptchaVerifier);
                displayPhone.innerText = `OTP sent to ${phone}`;
                loginScreen.classList.add('hidden');
                otpScreen.style.display = 'flex';
            } catch (error) {
                alert('Error: ' + error.message);
            }
        });

        verifyBtn.addEventListener('click', async () => {
            const otp = otpInput.value.trim();
            if (!otp) return alert('Enter OTP');

            try {
                const result = await confirmationResult.confirm(otp);
                currentUser = result.user;
                await set(ref(database, 'users/' + currentUser.uid), {
                    phone: currentUser.phoneNumber,
                    online: true
                });
                onDisconnect(ref(database, 'users/' + currentUser.uid)).remove();
                
                otpScreen.style.display = 'none';
                chatScreen.style.display = 'flex';
                chatUser.innerText = currentUser.phoneNumber;
                loadMessages();
            } catch {
                alert('Invalid OTP');
            }
        });

        resendBtn.addEventListener('click', () => sendOtpBtn.click());

        // ---------- GOOGLE SIGN-IN ----------
        googleSignInBtn.addEventListener('click', async () => {
            const provider = new GoogleAuthProvider();
            try {
                const result = await signInWithPopup(auth, provider);
                currentUser = result.user;
                
                await set(ref(database, 'users/' + currentUser.uid), {
                    name: currentUser.displayName,
                    email: currentUser.email,
                    photo: currentUser.photoURL,
                    online: true
                });
                onDisconnect(ref(database, 'users/' + currentUser.uid)).remove();

                loginScreen.classList.add('hidden');
                chatScreen.style.display = 'flex';
                chatUser.innerText = currentUser.displayName || currentUser.email;
                loadMessages();
            } catch (error) {
                alert('Google Sign-In failed');
            }
        });

        // ---------- CHAT FUNCTIONS ----------
        sendMsgBtn.addEventListener('click', async () => {
            const text = messageInput.value.trim();
            if (!text || !currentUser) return;

            const msgRef = push(ref(database, 'messages'));
            await set(msgRef, {
                text: text,
                sender: currentUser.uid,
                name: currentUser.displayName || currentUser.phoneNumber,
                timestamp: Date.now()
            });
            messageInput.value = '';
        });

        function loadMessages() {
            const messagesRef = ref(database, 'messages');
            onChildAdded(messagesRef, (data) => {
                const msg = data.val();
                const msgDiv = document.createElement('div');
                msgDiv.className = 'message ' + (msg.sender === currentUser?.uid ? 'sent' : 'received');
                
                const time = new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                msgDiv.innerHTML = `<strong>${msg.name || 'User'}</strong><br>${msg.text}<small>${time}</small>`;
                
                messagesDiv.appendChild(msgDiv);
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            });
        }

        backBtn.addEventListener('click', () => {
            chatScreen.style.display = 'none';
            loginScreen.classList.remove('hidden');
        });

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMsgBtn.click();
        });
    </script>
</body>
</html>
